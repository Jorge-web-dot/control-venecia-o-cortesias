<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cortesías Venecia - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d0d0d; color: #e0e0e0; margin: 0; padding: 10px; touch-action: manipulation; }
        .container { max-width: 500px; margin: auto; background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        h2 { text-align: center; color: #d4af37; text-transform: uppercase; font-size: 1.1em; margin-bottom: 15px; }
        
        .input-group { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #d4af37; }
        label { display: block; font-size: 0.75em; color: #888; margin-bottom: 5px; text-transform: uppercase; }

        /* Panel de Tiempo de Alta Precisión */
        .time-panel { background: #111; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; }
        .time-display { color: #d4af37; font-size: 2.5em; font-weight: bold; font-family: monospace; margin-bottom: 15px; letter-spacing: 2px; }
        
        .control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .time-column { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .col-label { font-size: 0.7em; color: #666; font-weight: bold; }

        /* Estilos de Botones */
        .btn-unit { background: #333; color: white; border: 1px solid #444; width: 100%; padding: 15px 0; border-radius: 6px; font-size: 1.4em; font-weight: bold; }
        .btn-turbo { background: #222; color: #d4af37; border: 1px solid #333; width: 100%; padding: 10px 0; border-radius: 6px; font-size: 1em; }
        .btn-unit:active { background: #d4af37; color: black; }
        .btn-turbo:active { background: #444; }

        .ampm-switch { background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 8px 20px; border-radius: 20px; margin-top: 15px; font-weight: bold; }

        /* Resto de la interfaz */
        .grid-btn { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        button { border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-n { background: #333; color: white; padding: 12px 5px; }
        .btn-p { background: #252525; color: #d4af37; border: 1px solid #444; padding: 12px 5px; }
        .active-btn { background: #d4af37 !important; color: black !important; }
        input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; margin-top: 5px; }
        .btn-reg { background: #d4af37; color: black; width: 100%; font-size: 1.1em; padding: 18px; margin-top: 15px; text-transform: uppercase; font-weight: bold; }
        .btn-view { background: transparent; color: #888; width: 100%; margin-top: 10px; padding: 10px; border: 1px solid #333; font-size: 0.8em; }
        .oculto { display: none; }
        .tabla-resumen td { padding: 10px 5px; border-bottom: 1px solid #333; text-align: center; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <div id="v-registro">
        <h2>Registro de Cortesía</h2>

        <div class="input-group">
            <label>Fecha y Hora de Entrega</label>
            <input type="date" id="f" style="margin-bottom:15px;">
            
            <div class="time-panel">
                <div class="time-display">
                    <span id="h-disp">12</span>:<span id="m-disp">00</span>
                </div>

                <div class="control-row">
                    <div class="time-column">
                        <span class="col-label">HORAS</span>
                        <button class="btn-turbo" onmousedown="startTurbo('h', 1)" onmouseup="stopTurbo()" ontouchstart="startTurbo('h', 1)" ontouchend="stopTurbo()">▲▲</button>
                        <button class="btn-unit" onclick="modSimple('h', 1)">+</button>
                        <button class="btn-unit" onclick="modSimple('h', -1)">-</button>
                        <button class="btn-turbo" onmousedown="startTurbo('h', -1)" onmouseup="stopTurbo()" ontouchstart="startTurbo('h', -1)" ontouchend="stopTurbo()">▼▼</button>
                    </div>
                    <div class="time-column">
                        <span class="col-label">MINUTOS</span>
                        <button class="btn-turbo" onmousedown="startTurbo('m', 1)" onmouseup="stopTurbo()" ontouchstart="startTurbo('m', 1)" ontouchend="stopTurbo()">▲▲</button>
                        <button class="btn-unit" onclick="modSimple('m', 1)">+</button>
                        <button class="btn-unit" onclick="modSimple('m', -1)">-</button>
                        <button class="btn-turbo" onmousedown="startTurbo('m', -1)" onmouseup="stopTurbo()" ontouchstart="startTurbo('m', -1)" ontouchend="stopTurbo()">▼▼</button>
                    </div>
                </div>
                <button class="ampm-switch" id="ampm-btn" onclick="toggleAMPM()">AM</button>
            </div>
        </div>

        <div class="input-group">
            <label>1. ¿A quién?</label>
            <div class="grid-btn">
                <button class="btn-n" onclick="setN('Sr. Cristian', this)">Sr. Cristian</button>
                <button class="btn-n" onclick="setN('Sr. Luis', this)">Sr. Luis</button>
                <button class="btn-n" onclick="setN('Sr. Ignacio', this)">Sr. Ignacio</button>
                <button class="btn-n" onclick="setN('Sr. Orestes', this)">Sr. Orestes</button>
                <button class="btn-n" onclick="setN('DJ', this)">DJ</button>
                <button class="btn-n" style="background:#444" onclick="prepararTaxista(this)">TAXISTA</button>
            </div>
            <input type="text" id="nom" list="lista-taxistas" placeholder="Nombre o Placa...">
            <datalist id="lista-taxistas"></datalist>
        </div>

        <div class="input-group">
            <label>2. ¿Qué producto?</label>
            <div class="grid-btn">
                <button class="btn-p" onclick="setP('Agua', this)">Agua</button>
                <button class="btn-p" onclick="setP('Agua G.', this)">Agua G.</button>
                <button class="btn-p" onclick="setP('Coca Cola', this)">Coca Cola</button>
                <button class="btn-p" onclick="setP('Volt', this)">Volt</button>
                <button class="btn-p" onclick="setP('Red Bull', this)">Red Bull</button>
                <button class="btn-p" onclick="setP('Corona', this)">Corona</button>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="pro" placeholder="Otro..." style="flex:2">
                <input type="number" id="can" value="1" style="flex:1">
            </div>
        </div>

        <button class="btn-reg" onclick="registrar()">Guardar Cortesía</button>
        <button class="btn-view" onclick="irA('v-resumen')">Ver Resumen Diario</button>
    </div>

    <div id="v-resumen" class="oculto">
        <h2 style="color:#d4af37">Resumen</h2>
        <input type="date" id="filtro" onchange="consultar()" style="margin-bottom:10px;">
        <div id="lista-totales" style="background:#222; padding:10px; border-radius:8px; border:1px solid #d4af37; margin-bottom:15px;"></div>
        <table style="width:100%; border-collapse: collapse;">
            <tbody id="cuerpo-tabla"></tbody>
        </table>
        <button class="btn-reg" style="background:#333; color:white;" onclick="irA('v-registro')">Volver</button>
    </div>
</div>

<script>
    // Configuración Firebase (Usando tu proyecto existente)
    const firebaseConfig = {
        apiKey: "AIzaSyAKJ0vJGvnzIdkKIvD1w0NCStA19T-TzoM",
        authDomain: "venecia-control.firebaseapp.com",
        projectId: "venecia-control",
        storageBucket: "venecia-control.firebasestorage.app",
        messagingSenderId: "486778694402",
        appId: "1:486778694402:web:4276617163b85b5b7bf01b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Lógica de Tiempo
    let h = new Date().getHours();
    let m = new Date().getMinutes();
    let isAM = h < 12;
    let dispH = h % 12 || 12;
    let tTimer;

    function updateTimeUI() {
        document.getElementById('h-disp').innerText = dispH.toString().padStart(2, '0');
        document.getElementById('m-disp').innerText = m.toString().padStart(2, '0');
        document.getElementById('ampm-btn').innerText = isAM ? "AM" : "PM";
    }

    // Función de cambio unitario (Evita el doble salto)
    function modSimple(tipo, val) {
        if(tipo === 'h') {
            dispH += val;
            if(dispH > 12) dispH = 1;
            if(dispH < 1) dispH = 12;
        } else {
            m += val;
            if(m > 59) m = 0;
            if(m < 0) m = 59;
        }
        updateTimeUI();
    }

    // Función Turbo
    function startTurbo(tipo, val) {
        tTimer = setInterval(() => modSimple(tipo, val), 100);
    }
    function stopTurbo() { clearInterval(tTimer); }

    function toggleAMPM() { isAM = !isAM; updateTimeUI(); }

    // Selección de campos
    function setN(v, btn) { document.getElementById('nom').value = v; reset('btn-n'); btn.classList.add('active-btn'); }
    function setP(v, btn) { document.getElementById('pro').value = v; reset('btn-p'); btn.classList.add('active-btn'); }
    function reset(c) { document.querySelectorAll('.'+c).forEach(b => b.classList.remove('active-btn')); }
    function prepararTaxista(btn) { document.getElementById('nom').value = "Tax: "; document.getElementById('nom').focus(); reset('btn-n'); btn.classList.add('active-btn'); }

    async function registrar() {
        const nom = document.getElementById('nom').value;
        const pro = document.getElementById('pro').value;
        if(!nom || !pro) return alert("Completa nombre y producto");

        const data = {
            f: document.getElementById('f').value,
            h: `${dispH.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')} ${isAM ? 'AM':'PM'}`,
            n: nom, p: pro,
            c: parseInt(document.getElementById('can').value) || 1,
            t: Date.now()
        };

        try {
            await db.collection("cortesias").add(data);
            alert("¡Guardado!");
            document.getElementById('pro').value = "";
            reset('btn-p');
        } catch (e) { alert("Error al conectar"); }
    }

    function irA(id) {
        document.getElementById('v-registro').classList.add('oculto');
        document.getElementById('v-resumen').classList.add('oculto');
        document.getElementById(id).classList.remove('oculto');
        if(id === 'v-resumen') { document.getElementById('filtro').value = document.getElementById('f').value; consultar(); }
    }

    function consultar() {
        const f = document.getElementById('filtro').value;
        db.collection("cortesias").where("f", "==", f).onSnapshot(snap => {
            const tabla = document.getElementById('cuerpo-tabla');
            const totales = document.getElementById('lista-totales');
            tabla.innerHTML = ""; totales.innerHTML = "";
            let sumas = {}, lista = [];
            snap.forEach(doc => lista.push({id: doc.id, ...doc.data()}));
            lista.sort((a, b) => b.t - a.t);
            lista.forEach(d => {
                tabla.innerHTML += `<tr><td>${d.h}</td><td><b>x${d.c}</b></td><td>${d.n}</td><td>${d.p}</td><td><button onclick="borrar('${d.id}')" style="background:#600; color:white; padding:5px;">X</button></td></tr>`;
                sumas[d.p] = (sumas[d.p] || 0) + (parseInt(d.c) || 0);
            });
            for(let p in sumas) totales.innerHTML += `<div>${p}: <b>x${sumas[p]}</b></div>`;
        });
    }

    async function borrar(id) { if(confirm("¿Borrar?")) await db.collection("cortesias").doc(id).delete(); }

    window.onload = () => {
        document.getElementById('f').value = new Date().toISOString().split('T')[0];
        updateTimeUI();
    };
</script>
</body>
</html>
