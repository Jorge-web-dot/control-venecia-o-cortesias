<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cortesías Venecia - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d0d0d; color: #e0e0e0; margin: 0; padding: 10px; touch-action: manipulation; }
        .container { max-width: 500px; margin: auto; background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        h2 { text-align: center; color: #d4af37; text-transform: uppercase; font-size: 1.1em; margin-bottom: 15px; }
        
        .input-group { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #d4af37; }
        label { display: block; font-size: 0.75em; color: #888; margin-bottom: 5px; text-transform: uppercase; }

        /* Panel de Tiempo Mejorado */
        .time-panel { background: #111; padding: 12px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; }
        .time-display-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .time-val { color: #d4af37; font-size: 2em; font-weight: bold; font-family: monospace; width: 50px; text-align: center; }
        
        .control-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; }
        .col-ctrl { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        
        /* Botones Diferenciados */
        .btn-fast { background: #444; color: #d4af37; border: none; width: 100%; padding: 10px; border-radius: 5px; font-size: 1.2em; cursor: pointer; }
        .btn-slow { background: #333; color: white; border: 1px solid #555; width: 100%; padding: 12px; border-radius: 5px; font-size: 1.3em; font-weight: bold; cursor: pointer; }
        .btn-ampm { background: #222; border: 1px solid #d4af37; color: #d4af37; padding: 10px 20px; border-radius: 5px; font-weight: bold; margin-top: 10px; }

        .grid-btn { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        button { border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-n { background: #333; color: white; padding: 12px 5px; }
        .btn-p { background: #252525; color: #d4af37; border: 1px solid #444; padding: 12px 5px; }
        .active-btn { background: #d4af37 !important; color: black !important; }
        
        input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; margin-top: 5px; }
        .btn-reg { background: #d4af37; color: black; width: 100%; font-size: 1.1em; padding: 15px; margin-top: 15px; text-transform: uppercase; font-weight: bold; }
        .btn-view { background: transparent; color: #888; width: 100%; margin-top: 10px; padding: 10px; border: 1px solid #333; font-size: 0.8em; }
        .oculto { display: none; }
        .tabla-resumen { width: 100%; border-collapse: collapse; font-size: 0.75em; margin-top: 15px; }
        .tabla-resumen td { padding: 10px 5px; border-bottom: 1px solid #333; text-align: center; }
        .btn-x { background: #600; color: white; border: none; padding: 5px 10px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div id="v-registro">
        <h2>Registro de Cortesía</h2>

        <div class="input-group">
            <label>Fecha y Hora</label>
            <input type="date" id="f" style="margin-bottom:12px;">
            
            <div class="time-panel">
                <div class="time-display-row">
                    <span id="h-val" class="time-val">12</span>
                    <span style="color:#d4af37; font-size:1.5em">:</span>
                    <span id="m-val" class="time-val">00</span>
                </div>

                <div class="control-grid">
                    <div class="col-ctrl">
                        <button class="btn-fast" onmousedown="startTurbo('h', 1)" onmouseup="stopTurbo()" ontouchstart="startTurbo('h', 1)" ontouchend="stopTurbo()">▲▲</button>
                        <button class="btn-slow" onclick="modUnit('h', 1)">+</button>
                        <button class="btn-slow" onclick="modUnit('h', -1)">-</button>
                        <button class="btn-fast" onmousedown="startTurbo('h', -1)" onmouseup="stopTurbo()" ontouchstart="startTurbo('h', -1)" ontouchend="stopTurbo()">▼▼</button>
                    </div>
                    <div class="col-ctrl">
                        <button class="btn-fast" onmousedown="startTurbo('m', 1)" onmouseup="stopTurbo()" ontouchstart="startTurbo('m', 1)" ontouchend="stopTurbo()">▲▲</button>
                        <button class="btn-slow" onclick="modUnit('m', 1)">+</button>
                        <button class="btn-slow" onclick="modUnit('m', -1)">-</button>
                        <button class="btn-fast" onmousedown="startTurbo('m', -1)" onmouseup="stopTurbo()" ontouchstart="startTurbo('m', -1)" ontouchend="stopTurbo()">▼▼</button>
                    </div>
                </div>
                <button class="btn-ampm" id="ampm-val" onclick="toggleAMPM()">AM</button>
            </div>
        </div>

        <div class="input-group">
            <label>1. ¿A quién?</label>
            <div class="grid-btn">
                <button class="btn-n" onclick="setN('Sr. Cristian', this)">Sr. Cristian</button>
                <button class="btn-n" onclick="setN('Sr. Luis', this)">Sr. Luis</button>
                <button class="btn-n" onclick="setN('Sr. Ignacio', this)">Sr. Ignacio</button>
                <button class="btn-n" onclick="setN('Sr. Orestes', this)">Sr. Orestes</button>
                <button class="btn-n" onclick="setN('DJ', this)">DJ</button>
                <button class="btn-n" style="background:#444" onclick="prepararTaxista(this)">TAXISTA</button>
            </div>
            <input type="text" id="nom" list="lista-taxistas" placeholder="Nombre o Placa...">
            <datalist id="lista-taxistas"></datalist>
        </div>

        <div class="input-group">
            <label>2. ¿Qué producto?</label>
            <div class="grid-btn">
                <button class="btn-p" onclick="setP('Agua', this)">Agua</button>
                <button class="btn-p" onclick="setP('Agua G.', this)">Agua G.</button>
                <button class="btn-p" onclick="setP('Coca Cola', this)">Coca Cola</button>
                <button class="btn-p" onclick="setP('Volt', this)">Volt</button>
                <button class="btn-p" onclick="setP('Red Bull', this)">Red Bull</button>
                <button class="btn-p" onclick="setP('Corona', this)">Corona</button>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="pro" placeholder="Otro..." style="flex:2">
                <input type="number" id="can" value="1" style="flex:1">
            </div>
        </div>

        <button class="btn-reg" onclick="registrar()">Guardar Cortesía</button>
        <button class="btn-view" onclick="irA('v-resumen')">Ver Resumen y Borrar</button>
    </div>

    <div id="v-resumen" class="oculto">
        <h2 style="color:#d4af37">Resumen</h2>
        <input type="date" id="filtro" onchange="consultar()" style="margin-bottom:10px;">
        <div id="resumen-totales" class="totales-box" style="background:#222; padding:10px; border-radius:8px; border:1px solid #d4af37;"><div id="lista-totales"></div></div>
        <table class="tabla-resumen">
            <tbody id="cuerpo-tabla"></tbody>
        </table>
        <button class="btn-reg" style="background:#333; color:white;" onclick="irA('v-registro')">Volver</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKJ0vJGvnzIdkKIvD1w0NCStA19T-TzoM",
        authDomain: "venecia-control.firebaseapp.com",
        projectId: "venecia-control",
        storageBucket: "venecia-control.firebasestorage.app",
        messagingSenderId: "486778694402",
        appId: "1:486778694402:web:4276617163b85b5b7bf01b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let curH = new Date().getHours();
    let curM = new Date().getMinutes();
    let isAM = curH < 12;
    let dispH = curH % 12 || 12;
    let turboTimer;

    function updateTimeUI() {
        document.getElementById('h-val').innerText = dispH.toString().padStart(2, '0');
        document.getElementById('m-val').innerText = curM.toString().padStart(2, '0');
        document.getElementById('ampm-val').innerText = isAM ? "AM" : "PM";
    }

    // TOQUE SIMPLE (Exacto 1 unidad)
    function modUnit(tipo, val) {
        if(tipo === 'h') {
            dispH += val;
            if(dispH > 12) dispH = 1;
            if(dispH < 1) dispH = 12;
        } else {
            curM += val;
            if(curM > 59) curM = 0;
            if(curM < 0) curM = 59;
        }
        updateTimeUI();
    }

    // MODO TURBO (Rápido)
    function startTurbo(tipo, val) {
        modUnit(tipo, val);
        turboTimer = setInterval(() => modUnit(tipo, val), 120);
    }
    function stopTurbo() { clearInterval(turboTimer); }

    function toggleAMPM() { isAM = !isAM; updateTimeUI(); }

    function setN(v, btn) {
        document.getElementById('nom').value = v;
        resetActives('btn-n');
        btn.classList.add('active-btn');
    }

    function prepararTaxista(btn) {
        document.getElementById('nom').value = "Tax: ";
        document.getElementById('nom').focus();
        resetActives('btn-n');
        btn.classList.add('active-btn');
    }

    function setP(v, btn) {
        document.getElementById('pro').value = v;
        resetActives('btn-p');
        btn.classList.add('active-btn');
    }

    function resetActives(clase) {
        document.querySelectorAll('.'+clase).forEach(b => b.classList.remove('active-btn'));
    }

    async function registrar() {
        const nom = document.getElementById('nom').value;
        const pro = document.getElementById('pro').value;
        if(!nom || !pro) return alert("Falta datos");

        const horaFull = `${dispH.toString().padStart(2, '0')}:${curM.toString().padStart(2, '0')} ${isAM ? 'AM':'PM'}`;
        const data = {
            f: document.getElementById('f').value,
            h: horaFull,
            n: nom, p: pro,
            c: parseInt(document.getElementById('can').value) || 1,
            t: Date.now()
        };

        try {
            await db.collection("cortesias").add(data);
            alert("Guardado");
            document.getElementById('pro').value = "";
            resetActives('btn-p');
            cargarSugerencias();
        } catch (e) { alert("Error"); }
    }

    function cargarSugerencias() {
        db.collection("cortesias").get().then(snap => {
            let nombres = new Set();
            snap.forEach(doc => {
                let n = doc.data().n;
                if(n && n.startsWith("Tax: ")) nombres.add(n);
            });
            const dl = document.getElementById('lista-taxistas');
            dl.innerHTML = "";
            nombres.forEach(n => dl.innerHTML += `<option value="${n}">`);
        });
    }

    function irA(id) {
        document.getElementById('v-registro').classList.add('oculto');
        document.getElementById('v-resumen').classList.add('oculto');
        document.getElementById(id).classList.remove('oculto');
        if(id === 'v-resumen') {
            document.getElementById('filtro').value = document.getElementById('f').value;
            consultar();
        }
    }

    function consultar() {
        const f = document.getElementById('filtro').value;
    
            const tabla = document.getElementById('cuerpo-tabla');
            const listaTotales = document.getElementById('lista-totales');
            tabla.innerHTML = ""; listaTotales.innerHTML = "";
            let sumas = {}, lista = [];
            snap.forEach(doc => lista.push({id: doc.id, ...doc.data()}));
            lista.sort((a, b) => b.t - a.t);
            lista.forEach(d => {
                tabla.innerHTML += `<tr><td>${d.h}</td><td>${d.c}</td><td>${d.n}</td><td>${d.p}</td><td><button class="btn-x" onclick="borrar('${d.id}')">X</button></td></tr>`;
                sumas[d.p] = (sumas[d.p] || 0) + (parseInt(d.c) || 0);
            });
            for(let p in sumas) listaTotales.innerHTML += `<div>${p}: <b>x${sumas[p]}</b></div>`;
        });
    }

    async function borrar(id) { if(confirm("¿Borrar?")) await db.collection("cortesias").doc(id).delete(); }

    window.onload = () => {
        document.getElementById('f').value = new Date().toISOString().split('T')[0];
        updateTimeUI();
        cargarSugerencias();
    };
</script>
</body>
</html>
